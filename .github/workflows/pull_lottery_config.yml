name: Pull lottery_config from DataGen

on:
  schedule:
    # 每天 UTC 7:02 = 北京时间 15:02
    - cron: '10 7 * * *'
  workflow_dispatch:

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download lottery_config.json from Heroplan_DataGen
        run: |
          # 使用 GitHub API 获取原始文件内容
          curl -H "Accept: application/vnd.github.v3.raw" \
               -o lottery_config.json \
               https://api.github.com/repos/Heroplan/Heroplan_DataGen/contents/lottery_config.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lottery_config.json
          git diff --staged --quiet || git commit -m "Pull latest lottery_config.json from DataGen"
          git push